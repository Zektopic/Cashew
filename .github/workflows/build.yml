name: Build Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: cd budget && flutter pub get

      # Gate on errors only: pre-existing warnings/infos are tracked but must
      # not block builds. Compile errors (e.g. duplicate fields from a bad
      # merge) fail this job.
      - name: Analyze
        run: cd budget && flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: cd budget && flutter test

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: cd budget && flutter pub get

      # google-services.json is not committed. Use the repo secret if
      # configured, otherwise fall back to the placeholder so debug builds
      # still compile.
      - name: Provide google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > budget/android/app/google-services.json
          else
            cp budget/android/app/google-services.json.example budget/android/app/google-services.json
          fi

      - name: Build APK
        run: cd budget && flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cashew-apk
          path: budget/build/app/outputs/flutter-apk/app-debug.apk

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: cd budget && flutter pub get

      - name: Build Linux
        run: cd budget && flutter build linux --release

      - name: Archive Linux build
        run: tar -czf cashew-linux.tar.gz -C budget/build/linux/x64/release/bundle .

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: cashew-linux
          path: cashew-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: cd budget && flutter pub get

      - name: Build Windows
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: cd budget && flutter build windows --release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: cashew-windows
          path: budget/build/windows/x64/runner/Release/

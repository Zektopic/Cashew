name: Build Binaries

on:
  push:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: cd budget && flutter pub get

      - name: Build APK
        run: cd budget && flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cashew-apk
          path: budget/build/app/outputs/flutter-apk/app-debug.apk

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: cd budget && flutter pub get

      - name: Build Linux
        run: cd budget && flutter build linux --release

      - name: Archive Linux build
        run: tar -czf cashew-linux.tar.gz -C budget/build/linux/x64/release/bundle .

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: cashew-linux
          path: cashew-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: cd budget && flutter pub get

      - name: Build Windows
        run: cd budget && flutter build windows --release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: cashew-windows
          path: budget/build/windows/x64/runner/Release/
